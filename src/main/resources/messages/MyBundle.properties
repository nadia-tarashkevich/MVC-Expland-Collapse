mvc.settings.title=MVC Expand/Collapse Settings
mvc.settings.description=Quickly navigate your project by expanding the folders you need while automatically collapsing everything else. \n\nExample: Click "App" to expand the `app` folder and all its subfolders. Other project branches will collapse to keep the Project View clean. If `app` is already expanded, clicking the button again will collapse only that folder. \n\nYou can set up to 5 custom folder names and assign shortcuts in the Keymap.
